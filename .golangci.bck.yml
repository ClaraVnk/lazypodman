linters:
  enable:
    - gofumpt
    - thelper
    - goimports
    - tparallel
    - wastedassign
    - unparam
    - prealloc
    - unconvert
    - exhaustive
    - makezero
    - nakedret
    # - goconst # TODO: enable and fix issues
  fast: false

linters-settings:
  exhaustive:
    default-signifies-exhaustive: true

  nakedret:
    # the gods will judge me but I just don't like naked returns at all
    max-func-lines: 0

run:
  # Kept at 1.24 to match the Go version golangci-lint itself is built
  # with (the action's pinned release); the module's go directive is 1.25
  # but our code uses no 1.25-only language features.
  go: '1.24'
  timeout: 10m
  # Match the Podman client build tags used everywhere else so the linter
  # analyzes pkg/runtime/podman under the same build configuration.
  build-tags:
    - containers_image_openpgp
    - exclude_graphdriver_btrfs
    - exclude_graphdriver_devicemapper
    - remote
