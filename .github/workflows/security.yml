name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    name: Go vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install govulncheck
        env:
          GOFLAGS: ""
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck with allowlist filter
        env:
          GOFLAGS: -mod=vendor
        run: |
          set -uo pipefail

          # Allowlist parsed from docs/security/accepted-vulnerabilities.md
          # (any GO-YYYY-NNNN id mentioned there is treated as accepted).
          ALLOWED=$(grep -oE 'GO-[0-9]{4}-[0-9]+' docs/security/accepted-vulnerabilities.md \
                    | sort -u || true)
          echo "Accepted vulnerabilities:"
          echo "${ALLOWED:-  (none)}" | sed 's/^/  /'
          echo

          # govulncheck exits 3 when it finds vulnerabilities that are
          # actually called from user code -- exactly what we want to gate.
          # Capture stdout, ignore the exit code, parse the text output.
          set +e
          govulncheck ./... | tee govulncheck.txt
          set -e

          # Only lines like "Vulnerability #N: GO-YYYY-NNNN" represent
          # vulns reachable from our code (vs. "found in modules you
          # require but your code doesn't appear to call").
          FOUND=$(grep -oE 'Vulnerability #[0-9]+: GO-[0-9]{4}-[0-9]+' govulncheck.txt \
                  | grep -oE 'GO-[0-9]{4}-[0-9]+' \
                  | sort -u || true)
          echo
          echo "Reachable vulnerabilities reported by govulncheck:"
          echo "${FOUND:-  (none)}" | sed 's/^/  /'
          echo

          UNACCEPTED=$(comm -23 <(echo "$FOUND") <(echo "$ALLOWED") || true)
          if [ -n "$UNACCEPTED" ]; then
            echo "::error::Unaccepted vulnerability/ies detected:"
            echo "$UNACCEPTED" | sed 's/^/  - /'
            echo
            echo "Either fix the underlying dependency, or document the"
            echo "vulnerability in docs/security/accepted-vulnerabilities.md"
            echo "with a written justification before re-running CI."
            exit 1
          fi

          echo "All reachable vulnerabilities are on the accepted list."
      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: govulncheck.txt
          retention-days: 30

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
