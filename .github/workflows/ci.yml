name: Continuous Integration

env:
  GO_VERSION: 1.26
  # Podman client build tags: build the bindings tree CGO-free, without the
  # storage graph drivers that need C libraries. See
  # docs/adr/0005-podman-native-backend.md.
  GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    name: ci - ${{matrix.os}}
    runs-on: ${{matrix.os}}
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-test
          restore-keys: |
            ${{runner.os}}-go-
      - name: Test code
        run: |
          bash ./test.sh
  build:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      GOARCH: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-build
          restore-keys: |
            ${{runner.os}}-go-
      - name: Build linux binary
        run: |
          GOOS=linux go build
      - name: Build windows binary
        run: |
          GOOS=windows go build
      - name: Build darwin binary
        run: |
          GOOS=darwin go build
  check-codebase:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      GOARCH: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-build
          restore-keys: |
            ${{runner.os}}-go-
      - name: Check Cheatsheet
        run: |
          go run scripts/cheatsheet/main.go check
      - name: Check Vendor Directory
        # ensure our vendor directory matches up with our go modules
        run: |
          go mod vendor && git diff --exit-code || (echo "Unexpected change to vendor directory. Run 'go mod vendor' locally and commit the changes" && exit 1)
  lint:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      # Keep golangci-lint's heap in check while it type-checks the large
      # Podman dependency tree, so it doesn't OOM the 7 GB runner.
      GOGC: "20"
      GOMEMLIMIT: 6GiB
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-test
          restore-keys: |
            ${{runner.os}}-go-
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: Format code
        run: |
          if [ $(find . ! -path "./vendor/*" -name "*.go" -exec gofmt -s -d {} \;|wc -l) -gt 0 ]; then
           find . ! -path "./vendor/*" -name "*.go" -exec gofmt -s -d {} \;
           exit 1
          fi
      - name: errors
        run: golangci-lint run
        if: ${{ failure() }}
  compliance:
    name: dual-backend compliance
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      LAZYPODMAN_INTEGRATION: "1"
      CONTAINER_HOST: unix:///tmp/podman.sock
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Install and start Podman
        # Podman is the default backend, so its parity MUST be exercised in
        # CI: fail the job if the socket does not come up, rather than
        # letting the compliance suite silently self-skip the Podman backend
        # and report a misleading green check.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q podman
          # CONTAINER_HOST is set at the job level for the compliance suite
          # (the client). `podman system service` also reads it and adds it as
          # an implicit endpoint, which then clashes with the explicit URI
          # below ("accepts at most 1 arg(s)"). Unset it just for the server.
          env -u CONTAINER_HOST podman system service --time=0 unix:///tmp/podman.sock >/tmp/podman-service.log 2>&1 &
          for i in $(seq 1 20); do
            [ -S /tmp/podman.sock ] && break
            sleep 1
          done
          if [ ! -S /tmp/podman.sock ]; then
            echo "::error::Podman socket did not start; cannot verify Podman parity."
            cat /tmp/podman-service.log || true
            exit 1
          fi
          # Confirm the socket actually serves the API before relying on it.
          if ! podman --url unix:///tmp/podman.sock version >/dev/null 2>&1; then
            echo "::error::Podman socket is present but not serving the API."
            cat /tmp/podman-service.log || true
            exit 1
          fi
          echo "Podman socket is up and serving the API."
      - name: Run compliance suite (Podman backend)
        # Exercises the Podman backend (CONTAINER_HOST above) against the read
        # contracts. lazypodman is Podman-only, so Podman is the only backend
        # the suite registers. The Podman socket is guaranteed up by the
        # previous step.
        run: |
          go test -v ./pkg/runtime/compliance/...
      - name: Verify Podman streaming cancellation
        # Regression guard for the container-switch freeze: a followed log
        # stream must tear down when the caller cancels its context, not only
        # when the reader is closed. Provision a throwaway running container so
        # the integration test has a live log stream to cancel, then run it
        # under -race. Without this, the freeze would only surface in manual
        # use (the compliance read-contracts don't open streams).
        run: |
          podman --url unix:///tmp/podman.sock pull -q docker.io/library/busybox
          podman --url unix:///tmp/podman.sock run -d --name ci-logspam \
            docker.io/library/busybox sh -c 'while true; do echo log; sleep 1; done'
          trap 'podman --url unix:///tmp/podman.sock rm -f ci-logspam >/dev/null 2>&1 || true' EXIT
          go test -race -run TestContainerLogsCancelUnblocks ./pkg/runtime/podman/
