name: Continuous Integration

env:
  GO_VERSION: 1.26
  # Podman client build tags: build the bindings tree CGO-free, without the
  # storage graph drivers that need C libraries. See
  # docs/adr/0005-podman-native-backend.md.
  GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    name: ci - ${{matrix.os}}
    runs-on: ${{matrix.os}}
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-test
          restore-keys: |
            ${{runner.os}}-go-
      - name: Test code
        run: |
          bash ./test.sh
  build:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      GOARCH: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-build
          restore-keys: |
            ${{runner.os}}-go-
      - name: Build linux binary
        run: |
          GOOS=linux go build
      - name: Build windows binary
        run: |
          GOOS=windows go build
      - name: Build darwin binary
        run: |
          GOOS=darwin go build
  check-codebase:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      GOARCH: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-build
          restore-keys: |
            ${{runner.os}}-go-
      - name: Check Cheatsheet
        run: |
          go run scripts/cheatsheet/main.go check
      - name: Check Vendor Directory
        # ensure our vendor directory matches up with our go modules
        run: |
          go mod vendor && git diff --exit-code || (echo "Unexpected change to vendor directory. Run 'go mod vendor' locally and commit the changes" && exit 1)
  lint:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      # Keep golangci-lint's heap in check while it type-checks the large
      # Podman dependency tree, so it doesn't OOM the 7 GB runner.
      GOGC: "20"
      GOMEMLIMIT: 6GiB
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{runner.os}}-go-${{hashFiles('**/go.sum')}}-test
          restore-keys: |
            ${{runner.os}}-go-
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: Format code
        run: |
          if [ $(find . ! -path "./vendor/*" -name "*.go" -exec gofmt -s -d {} \;|wc -l) -gt 0 ]; then
           find . ! -path "./vendor/*" -name "*.go" -exec gofmt -s -d {} \;
           exit 1
          fi
      - name: errors
        run: golangci-lint run
        if: ${{ failure() }}
  compliance:
    name: dual-backend compliance
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
      LAZYPODMAN_INTEGRATION: "1"
      CONTAINER_HOST: unix:///tmp/podman.sock
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Install and start Podman
        # Best-effort: if the Podman socket does not come up, the suite
        # self-skips the Podman backend and still exercises Docker. The
        # step itself never fails the job for that reason.
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q podman || true
          podman system service -t 0 unix:///tmp/podman.sock >/tmp/podman-service.log 2>&1 &
          for i in $(seq 1 20); do
            [ -S /tmp/podman.sock ] && break
            sleep 1
          done
          if [ -S /tmp/podman.sock ]; then
            echo "Podman socket is up."
          else
            echo "Podman socket did not start; the suite will skip the Podman backend:"
            cat /tmp/podman-service.log || true
          fi
      - name: Run dual-backend compliance suite
        # Exercises the Podman backend (CONTAINER_HOST above) and the Docker
        # backend (the runner's preinstalled docker daemon) against the same
        # read contracts. Each backend self-skips if its socket is absent.
        run: |
          go test -v ./pkg/runtime/compliance/...
