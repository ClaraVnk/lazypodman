name: Release

# Publishes cross-platform release archives and an OCI image when a version
# tag is pushed. Tag with: git tag -a v0.1.0 -m "v0.1.0" && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history and tags are required for the changelog.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image reference
        id: meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}" # GHCR requires a lowercase namespace
          echo "image=ghcr.io/${owner}/lazypodman" >>"$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"

      - name: Build image
        run: |
          podman build \
            --build-arg VERSION="${GITHUB_REF_NAME#v}" \
            --build-arg VCS_REF="${GITHUB_SHA::7}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            .
          podman save -o /tmp/lazypodman-image.tar "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"

      - name: Scan image (Trivy, report-only)
        # Report HIGH/CRITICAL fixable vulnerabilities without blocking the
        # release: the alpine base may carry CVEs with no available fix.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy image --input /tmp/lazypodman-image.tar \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 --format table

      - name: Log in to GHCR and push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          podman push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          podman push "${{ steps.meta.outputs.image }}:latest"
