services:
  lazypodman:
    build:
      context: .
      dockerfile: Containerfile
      args:
        BASE_IMAGE_BUILDER: golang
        GOARCH: amd64
        GOARM:
    image: lazypodman
    container_name: lazypodman
    stdin_open: true
    tty: true
    environment:
      # lazypodman talks to the engine over its API socket (no CLI needed).
      CONTAINER_HOST: unix:///run/podman/podman.sock
    volumes:
      # Expose the host Podman socket. For a rootless engine, use
      # ${XDG_RUNTIME_DIR}/podman/podman.sock on both sides instead.
      - /run/podman/podman.sock:/run/podman/podman.sock
      - ./config:/.config/lazypodman
