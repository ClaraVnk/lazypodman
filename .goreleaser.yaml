# GoReleaser configuration for lazypodman.
# Cross-compiled, CGO-free static binaries. The build tags are mandatory:
# they build the Podman bindings tree without the storage graph drivers that
# need C libraries (see docs/adr/0005-podman-native-backend.md).
#
# Validate locally:  goreleaser check
# Dry-run a build:    goreleaser release --snapshot --clean
version: 2

project_name: lazypodman

builds:
  - id: lazypodman
    binary: lazypodman
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor
      - -trimpath
      - -tags=containers_image_openpgp,exclude_graphdriver_btrfs,exclude_graphdriver_devicemapper,remote
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    # lazypodman_<version>_<os>_<arch>; os is lowercase (linux/darwin/windows),
    # arch is amd64/arm64. scripts/install_update_linux.sh derives this name.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
